<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR AWARE - Air Quality Forecasting</title>

<link rel="stylesheet" href="Home.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
#aira-widget-container{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:9999;
    font-family:'Georgia',serif;
}

#aira-toggle-button{
    width:55px;
    height:55px;
    border-radius:50%;
    background:#8b5e3c;
    color:white;
    border:none;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
    font-size:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.2s;
}

#aira-toggle-button:hover{
    background:#7a5130;
    transform:translateY(-2px);
}

#chatbox{
    width:380px;
    height:500px;
    background:#fdf6e3;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
    position:absolute;
    bottom:75px;
    right:0;
    display:flex;
    flex-direction:column;
    transform:scale(0.5);
    transform-origin:bottom right;
    opacity:0;
    visibility:hidden;
    transition:0.3s;
}

#chatbox.open{
    transform:scale(1);
    opacity:1;
    visibility:visible;
}

#chatbox h2{
    font-family:'Montserrat',sans-serif;
    color:#3e2f1c;
    margin-top:0;
}

#messages{
    flex-grow:1;
    overflow-y:auto;
    background:#fffaf5;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

.msg{
    margin:8px 0;
    padding:10px;
    border-radius:10px;
    max-width:85%;
    word-wrap:break-word;
    font-size:14px;
}

.user{
    background:#d7f0ff;
    color:#222;
    margin-left:auto;
    text-align:right;
}

.bot{
    background:#f3e4d4;
    color:#3e2f1c;
    margin-right:auto;
}

#userInput{
    flex-grow:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #bfae9f;
}

#quickButtons{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

#quickButtons button{
    flex:1 1 45%;
    padding:8px;
    background:#8b5e3c;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#backButton{
    position:absolute;
    top:12px;
    right:12px;
    background:transparent;
    border:none;
    font-size:18px;
    font-weight:bold;
    color:#8b5e3c;
    cursor:pointer;
    padding:0;
    margin:0;
    width:25px;
    height:25px;
    box-shadow:none;
    z-index:9999;
}
</style>
</head>

<body>

<header>
    <a href="index.html" class="logo-container">
        <img src="assests/cloud-removebg-preview.png"
             alt="Site Logo"
             class="logo">
    </a>

    <nav class="main-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="data.html">Analytics</a></li>
            <li><a href="info.html">Health Info</a></li>
            <li><a href="story.html">AirTales</a></li>
            <li><a href="dairy.html">AirAware Diary</a></li>
            <li><a href="map.html" class="cta-button">AIR Nav</a></li>
        </ul>
    </nav>
</header>

<video autoplay muted loop playsinline id="bg-video">
    <source src="assests/306701_small.mp4" type="video/mp4">
</video>

<main class="hero">
    <div class="hero-content">
        <h1 class="masked-text">AIR AWARE</h1>
        <p>
            Your ultimate guide to real-time air quality forecasts
            and environmental insights.
        </p>
    </div>
</main>

<div id="aira-widget-container">

    <button id="aira-toggle-button" onclick="toggleChat()">
        🍃
    </button>

    <div id="chatbox">

        <button id="backButton" onclick="toggleChat()">✕</button>

        <h2>🍃 Aira – Your Breath Buddy</h2>

        <div id="messages"></div>

        <div>
            <input
                type="text"
                id="userInput"
                placeholder="Type your message..."
            />
            <button onclick="sendMessage()">Send</button>
        </div>

        <div id="quickButtons"></div>
    </div>
</div>

<script>
const messages=document.getElementById('messages');
const input=document.getElementById('userInput');
const quickButtonsDiv=document.getElementById('quickButtons');
const chatbox=document.getElementById('chatbox');
const toggleButton=document.getElementById('aira-toggle-button');

function toggleChat(){
    if(chatbox.classList.contains('open')){
        chatbox.classList.remove('open');
        toggleButton.innerHTML='🍃';
    }else{
        chatbox.classList.add('open');
        toggleButton.innerHTML='✕';

        if(messages.children.length===0){
            appendMsg(
                'bot',
                'Hi there 🌿 How can I help you feel better today?'
            );
            showQuickButtons();
        }
    }
}

function appendMsg(who,text,isHTML=false){
    const div=document.createElement('div');
    div.className='msg '+who;

    if(isHTML){
        div.innerHTML=text;
    }else{
        div.innerHTML=text;
    }

    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;
}

function showQuickButtons(){
    quickButtonsDiv.innerHTML=`
    <button onclick="triggerAction('airQuality')">🌍 Air Quality</button>
    <button onclick="triggerAction('hospitals')">🏥 Hospitals</button>
    <button onclick="triggerAction('viewDiary')">📓 View Diary</button>
    <button onclick="triggerAction('logDiary')">📝 Log Diary</button>
    `;
}

function triggerAction(action){

    if(action==='airQuality'){
        appendMsg(
            'bot',
            'Air quality support available 🌍'
        );
    }

    else if(action==='hospitals'){
        appendMsg(
            'bot',
            '<a href="https://www.google.com/maps/search/hospitals+near+me" target="_blank">Nearby Hospitals</a>',
            true
        );
    }

    else if(action==='viewDiary'){

        const diaryData=
            localStorage.getItem('airawareDiary');

        if(diaryData){
            appendMsg(
                'bot',
                '📓 Your Diary:<br><br>'+diaryData,
                true
            );
        }else{
            appendMsg(
                'bot',
                '📓 No diary entries found yet.'
            );
        }
    }

    else if(action==='logDiary'){
        window.location.href='dairy.html';
    }
}

function sendMessage(){

    const msg=input.value.trim();

    if(!msg) return;

    appendMsg('user',msg);
    input.value='';

    let reply="I'm here to help 🌿";

    if(msg.toLowerCase().includes('air')){
        reply='Air quality support available 🌍';
    }
    else if(msg.toLowerCase().includes('hospital')){
        reply='Nearby hospital support 🏥';
    }
    else if(msg.toLowerCase().includes('breath')){
        reply='Try a breathing exercise 🌬';
    }

    appendMsg('bot',reply);
}

input.addEventListener('keypress',function(e){
    if(e.key==='Enter'){
        sendMessage();
    }
});
</script>

</body>
</html>
